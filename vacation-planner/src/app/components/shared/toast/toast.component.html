<div class="toast-container">
  @for (toast of toastService.toasts; track toast.id) {
    <div class="toast" [class]="'toast--' + toast.type" [@toastAnimation]>
      {{ toast.message }}
      <button class="toast__close" (click)="toastService.remove(toast.id)">
        &times;
      </button>
    </div>
  }
</div>

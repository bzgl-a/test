<div class="container mt-3 p-0">
  <div class="row w-75 mb-4 mt-4">
    <h1 class="col-sm">Список сотрудников</h1>
  </div>
  <table
    class="mt-3 table border rounded-2 table-hover align-middle text-center"
  >
    <thead>
      <tr class="table-light">
        <th class="text-secondary">Пользователь</th>
        <th class="text-secondary">Количество неиспользованных дней</th>
        <th class="text-secondary">Ближайший отпуск</th>
      </tr>
    </thead>
    <tbody>
      @for (user of users; track user) {
        <tr>
          <td>
            {{ user.last_name }} {{ user.first_name }}
          </td>
          <td>{{ user.days_left }}</td>
          <td>-</td>
        </tr>
      }
    </tbody>
  </table>
</div>

services:
  db:
    image: postgres:16
    container_name: vacation-db
    environment:
      POSTGRES_DB: vacation_planner
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # ← именованный том
      - ./db:/docker-entrypoint-initdb.d
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: vacation-backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
